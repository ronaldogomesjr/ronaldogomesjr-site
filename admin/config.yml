backend:
  name: github
  repo: ronaldogomesjr/ronaldogomesjr-site
  branch: main
  base_url: /api
  auth_endpoint: auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: "pt"
site_url: "https://ronaldogomesjr-site.vercel.app"
display_url: "https://ronaldogomesjr-site.vercel.app"

collections:
  - name: "conteudo"
    label: "Conteúdo do site"
    files:
      - label: "Páginas internas"
        name: "pages"
        file: "content/pages.json"
        format: "json"
        fields:
          - label: "Páginas"
            name: "items"
            widget: "list"
            summary: "{{fields.title_pt}} / {{fields.title_en}}"
            fields:
              - {label: "ID interno", name: "id", widget: "string"}
              - {label: "Slug em português", name: "slug_pt", widget: "string", required: false}
              - {label: "Slug em inglês", name: "slug_en", widget: "string", required: false}
              - {label: "Título em português", name: "title_pt", widget: "string", required: false}
              - {label: "Título em inglês", name: "title_en", widget: "string", required: false}
              - {label: "Subtítulo/texto de abertura em português", name: "intro_pt", widget: "text", required: false}
              - {label: "Subtitle/opening text in English", name: "intro_en", widget: "text", required: false}
              - {label: "Foto da página sobre", name: "portrait_image", widget: "image", required: false}
              - {label: "Texto alternativo da foto em português", name: "portrait_alt_pt", widget: "string", required: false}
              - {label: "Alt text for the photo in English", name: "portrait_alt_en", widget: "string", required: false}
              - {label: "Título SEO em português", name: "meta_title_pt", widget: "string", required: false}
              - {label: "Título SEO em inglês", name: "meta_title_en", widget: "string", required: false}
              - {label: "Descrição SEO em português", name: "meta_description_pt", widget: "text", required: false}
              - {label: "SEO description in English", name: "meta_description_en", widget: "text", required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Publicações"
        name: "publicacoes"
        file: "content/publicacoes.json"
        format: "json"
        fields:
          - label: "Publicações"
            name: "items"
            widget: "list"
            summary: "{{fields.ano}} — {{fields.titulo}}"
            fields:
              - {label: "Tipo", name: "tipo", widget: "select", options: [{label: "Artigo", value: "artigo"}, {label: "Capítulo", value: "capitulo"}, {label: "Livro acadêmico", value: "livro_academico"}]}
              - {label: "Idioma", name: "idioma", widget: "select", options: ["pt", "en"], default: "pt"}
              - {label: "Ano", name: "ano", widget: "string", required: false}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Autores", name: "autores", widget: "string", required: false}
              - {label: "Veículo / periódico / livro / editora", name: "veiculo", widget: "string", required: false}
              - {label: "Link externo", name: "link", widget: "string", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Destaque", name: "destaque", widget: "boolean", default: false, required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Projetos"
        name: "projetos"
        file: "content/projetos.json"
        format: "json"
        fields:
          - label: "Projetos"
            name: "items"
            widget: "list"
            summary: "{{fields.titulo_pt}}"
            fields:
              - {label: "Nome do projeto em português", name: "titulo_pt", widget: "string"}
              - {label: "Project name in English", name: "titulo_en", widget: "string", required: false}
              - {label: "Descrição em português", name: "descricao_pt", widget: "text", required: false}
              - {label: "Description in English", name: "descricao_en", widget: "text", required: false}
              - label: "Categoria / Category"
                name: "categoria"
                widget: "select"
                default: "pesquisa"
                options:
                  - {label: "Ensino / Teaching", value: "ensino"}
                  - {label: "Pesquisa / Research", value: "pesquisa"}
                  - {label: "Extensão / Extension", value: "extensao"}
                  - {label: "Internacionalização / Internationalization", value: "internacionalizacao"}
              - {label: "Ano de início", name: "ano_inicio", widget: "number", value_type: "int", required: false}
              - {label: "Ano de fim", name: "ano_fim", widget: "number", value_type: "int", required: false}
              - {label: "Link externo", name: "link", widget: "string", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Destaque", name: "destaque", widget: "boolean", default: false, required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Orientações / Supervisions"
        name: "orientacoes"
        file: "content/orientacoes.json"
        format: "json"
        fields:
          - label: "Orientações"
            name: "items"
            widget: "list"
            summary: "{{fields.orientando}} — {{fields.ano_inicio}}"
            fields:
              - label: "Nível / Level"
                name: "grau"
                widget: "select"
                options:
                  - {label: "Mestrado / Masters", value: "mestrado"}
                  - {label: "Doutorado / PhD", value: "doutorado"}
              - {label: "Nome do orientando", name: "orientando", widget: "string"}
              - {label: "Nome do trabalho em português", name: "trabalho_pt", widget: "text", required: false}
              - {label: "Work title in English", name: "trabalho_en", widget: "text", required: false}
              - {label: "Ano de início", name: "ano_inicio", widget: "number", value_type: "int", required: false}
              - {label: "Ano de fim", name: "ano_fim", widget: "number", value_type: "int", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Livros didáticos"
        name: "livros_didaticos"
        file: "content/livros-didaticos.json"
        format: "json"
        fields:
          - label: "Livros didáticos"
            name: "items"
            widget: "list"
            summary: "{{fields.ano}} — {{fields.titulo}}"
            fields:
              - {label: "Idioma", name: "idioma", widget: "select", options: ["pt", "en"], default: "pt"}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Editora", name: "editora", widget: "string", required: false}
              - {label: "Ano", name: "ano", widget: "string", required: false}
              - {label: "Nível", name: "nivel", widget: "string", required: false}
              - {label: "Descrição", name: "descricao", widget: "text", required: false}
              - {label: "Link externo", name: "link", widget: "string", required: false}
              - {label: "Imagem", name: "imagem", widget: "image", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Destaque", name: "destaque", widget: "boolean", default: false, required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Links de contato e rodapé"
        name: "links"
        file: "content/links.json"
        format: "json"
        fields:
          - label: "Links de contato e rodapé"
            name: "items"
            widget: "list"
            summary: "{{fields.nome}}"
            fields:
              - {label: "Nome", name: "nome", widget: "string"}
              - {label: "Descrição em português", name: "descricao_pt", widget: "text", required: false}
              - {label: "Description in English", name: "descricao_en", widget: "text", required: false}
              - {label: "Link", name: "link", widget: "string", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}
