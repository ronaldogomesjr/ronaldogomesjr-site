backend:
  name: github
  repo: ronaldogomesjr/ronaldogomesjr-site
  branch: main
  base_url: /api
  auth_endpoint: auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: "pt"
site_url: "https://ronaldogomesjr-site.vercel.app"
display_url: "https://ronaldogomesjr-site.vercel.app"

collections:
  - name: "conteudo"
    label: "Conteúdo do site"
    files:
      - label: "Página Design"
        name: "pagina_design"
        file: "content/design.json"
        format: "json"
        fields:
          - {label: "Título — PT", name: "title_pt", widget: "string"}
          - {label: "Título — EN", name: "title_en", widget: "string"}
          - {label: "Introdução — PT", name: "intro_pt", widget: "text"}
          - {label: "Introdução — EN", name: "intro_en", widget: "text"}
          - {label: "Texto central do diagrama — PT", name: "center_pt", widget: "text"}
          - {label: "Texto central do diagrama — EN", name: "center_en", widget: "text"}
          - label: "Nós do diagrama"
            name: "nodes"
            widget: "list"
            min: 5
            max: 5
            summary: "{{fields.title_pt}} / {{fields.title_en}}"
            fields:
              - {label: "Título — PT", name: "title_pt", widget: "string"}
              - {label: "Título — EN", name: "title_en", widget: "string"}
              - {label: "Descrição — PT", name: "text_pt", widget: "text"}
              - {label: "Descrição — EN", name: "text_en", widget: "text"}
          - {label: "Título da perspectiva — PT", name: "perspective_title_pt", widget: "string"}
          - {label: "Título da perspectiva — EN", name: "perspective_title_en", widget: "string"}
          - {label: "Texto da perspectiva — PT", name: "perspective_text_pt", widget: "text"}
          - {label: "Texto da perspectiva — EN", name: "perspective_text_en", widget: "text"}
          - label: "Etapas"
            name: "steps"
            widget: "list"
            min: 4
            max: 4
            summary: "{{fields.number}} — {{fields.text_pt}}"
            fields:
              - {label: "Número", name: "number", widget: "string"}
              - {label: "Texto — PT", name: "text_pt", widget: "text"}
              - {label: "Texto — EN", name: "text_en", widget: "text"}
          - {label: "Frase final — PT", name: "quote_pt", widget: "text"}
          - {label: "Frase final — EN", name: "quote_en", widget: "text"}
          - {label: "Título SEO — PT", name: "meta_title_pt", widget: "string", required: false}
          - {label: "Título SEO — EN", name: "meta_title_en", widget: "string", required: false}
          - {label: "Descrição SEO — PT", name: "meta_description_pt", widget: "text", required: false}
          - {label: "Descrição SEO — EN", name: "meta_description_en", widget: "text", required: false}

      - label: "Página Tecnologia Digital"
        name: "pagina_tecnologia_digital"
        file: "content/tecnologia-digital.json"
        format: "json"
        fields:
          - {label: "Título — PT", name: "title_pt", widget: "string"}
          - {label: "Título — EN", name: "title_en", widget: "string"}
          - {label: "Introdução — PT", name: "intro_pt", widget: "text"}
          - {label: "Introdução — EN", name: "intro_en", widget: "text"}
          - {label: "Título da perspectiva — PT", name: "perspective_title_pt", widget: "string"}
          - {label: "Título da perspectiva — EN", name: "perspective_title_en", widget: "string"}
          - {label: "Texto da perspectiva — PT", name: "perspective_text_pt", widget: "text"}
          - {label: "Texto da perspectiva — EN", name: "perspective_text_en", widget: "text"}
          - {label: "Título SEO — PT", name: "meta_title_pt", widget: "string", required: false}
          - {label: "Título SEO — EN", name: "meta_title_en", widget: "string", required: false}
          - {label: "Descrição SEO — PT", name: "meta_description_pt", widget: "text", required: false}
          - {label: "Descrição SEO — EN", name: "meta_description_en", widget: "text", required: false}



      - label: "Página Educação Linguística"
        name: "pagina_educacao_linguistica"
        file: "content/educacao-linguistica.json"
        format: "json"
        fields:
          - {label: "Título — PT", name: "title_pt", widget: "string"}
          - {label: "Título — EN", name: "title_en", widget: "string"}
          - {label: "Introdução — PT", name: "intro_pt", widget: "text"}
          - {label: "Introdução — EN", name: "intro_en", widget: "text"}
          - {label: "Título da perspectiva — PT", name: "perspective_title_pt", widget: "string"}
          - {label: "Título da perspectiva — EN", name: "perspective_title_en", widget: "string"}
          - {label: "Texto da perspectiva — PT", name: "perspective_text_pt", widget: "text"}
          - {label: "Texto da perspectiva — EN", name: "perspective_text_en", widget: "text"}
          - {label: "Título SEO — PT", name: "meta_title_pt", widget: "string", required: false}
          - {label: "Título SEO — EN", name: "meta_title_en", widget: "string", required: false}
          - {label: "Descrição SEO — PT", name: "meta_description_pt", widget: "text", required: false}
          - {label: "Descrição SEO — EN", name: "meta_description_en", widget: "text", required: false}

      - label: "Publicações"
        name: "publicacoes"
        file: "content/publicacoes.json"
        format: "json"
        fields:
          - label: "Publicações"
            name: "items"
            widget: "list"
            summary: "{{fields.ano}} — {{fields.titulo}}"
            fields:
              - {label: "Tipo", name: "tipo", widget: "select", options: [{label: "Artigo", value: "artigo"}, {label: "Capítulo", value: "capitulo"}, {label: "Livro acadêmico", value: "livro_academico"}]}
              - {label: "Idioma", name: "idioma", widget: "select", options: ["pt", "en"], default: "pt"}
              - {label: "Ano", name: "ano", widget: "string", required: false}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Autores", name: "autores", widget: "string", required: false}
              - {label: "Veículo / periódico / livro / editora", name: "veiculo", widget: "string", required: false}
              - {label: "Link externo", name: "link", widget: "string", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Destaque", name: "destaque", widget: "boolean", default: false, required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Projetos"
        name: "projetos"
        file: "content/projetos.json"
        format: "json"
        fields:
          - label: "Projetos"
            name: "items"
            widget: "list"
            summary: "{{fields.titulo}} — {{fields.ano_inicio}}–{{fields.ano_fim}}"
            fields:
              - {label: "Idioma", name: "idioma", widget: "select", options: ["pt", "en"], default: "pt"}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Descrição", name: "descricao", widget: "text", required: false}
              - {label: "Ano de início", name: "ano_inicio", widget: "string", required: false}
              - {label: "Ano de término", name: "ano_fim", widget: "string", required: false}
              - {label: "Período anterior (compatibilidade)", name: "periodo", widget: "string", required: false, hint: "Mantido apenas para projetos cadastrados antes dos campos de ano."}
              - {label: "Parceiros", name: "parceiros", widget: "string", required: false}
              - {label: "Link externo", name: "link", widget: "string", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Destaque", name: "destaque", widget: "boolean", default: false, required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Livros didáticos"
        name: "livros_didaticos"
        file: "content/livros-didaticos.json"
        format: "json"
        fields:
          - label: "Livros didáticos"
            name: "items"
            widget: "list"
            summary: "{{fields.ano}} — {{fields.titulo}}"
            fields:
              - {label: "Idioma", name: "idioma", widget: "select", options: ["pt", "en"], default: "pt"}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Editora", name: "editora", widget: "string", required: false}
              - {label: "Ano", name: "ano", widget: "string", required: false}
              - {label: "Nível", name: "nivel", widget: "string", required: false}
              - {label: "Descrição", name: "descricao", widget: "text", required: false}
              - {label: "Link externo", name: "link", widget: "string", required: false}
              - {label: "Imagem", name: "imagem", widget: "image", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Destaque", name: "destaque", widget: "boolean", default: false, required: false}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

      - label: "Links"
        name: "links"
        file: "content/links.json"
        format: "json"
        fields:
          - label: "Links"
            name: "items"
            widget: "list"
            summary: "{{fields.nome}}"
            fields:
              - {label: "Idioma", name: "idioma", widget: "select", options: ["pt", "en"], default: "pt"}
              - {label: "Nome", name: "nome", widget: "string"}
              - {label: "Tipo", name: "tipo", widget: "string", required: false}
              - {label: "Link", name: "link", widget: "string", required: false}
              - {label: "Visível no site", name: "visivel", widget: "boolean", default: true}
              - {label: "Ordem", name: "ordem", widget: "number", value_type: "int", required: false}

